# Single compose file: агент + Qdrant + Neo4j.
# Memory-бэкенды поднимаются independently, агент стартует поверх них.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: harnes-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP REST
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: harnes-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/harnes-dev-pw
      # APOC нужен Graphiti для расширенных Cypher-функций.
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harnes-agent
    restart: "no"  # dev — не перезапускаем после exit; меняем на on-failure для непрерывного режима
    depends_on:
      - qdrant
      - neo4j
    volumes:
      # Состояние агента (LanceDB, SQLite, JSONL-traces) — на хосте, чтобы переживало пересборку.
      - ./data:/app/data
      # Конфиг read-only.
      - ./config:/app/config:ro
      # Git-versioned skill bundles, проброшены с хоста.
      - ./skills:/app/skills
    environment:
      # LLM
      LLM_API_BASE: "http://192.168.0.111:8000/v1"
      LLM_API_KEY: "dummy"
      LLM_MODEL: "gemma-26b-a4b"
      # Memory backends (по hostname в compose-сети)
      QDRANT_URL: "http://qdrant:6333"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "harnes-dev-pw"
      # Прочее
      LOGGING_LEVEL: "INFO"
    stdin_open: true
    tty: true

volumes:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
