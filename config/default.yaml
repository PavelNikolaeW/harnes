# Дефолтная конфигурация. Переопределяется через env-переменные
# (env_nested_delimiter = "__", например LLM__MODEL=...).

llm:
  api_base: "http://192.168.0.111:8000/v1"
  api_key: "dummy"
  # Дефолтная модель (когда tier не указан явно).
  model: "gemma-26b-a4b"
  timeout: 60
  max_retries: 3
  # Tier → model_id. В dev все на gemma-26b-a4b (быстро итерируется).
  # В проде заменить main на gemma-31b-mtp, heavy на qwen-35b.
  tiers:
    light: "gemma-26b-a4b"
    main:  "gemma-26b-a4b"
    heavy: "gemma-26b-a4b"
  default_tier: "main"

memory:
  lancedb_path: "/app/data/lancedb"
  qdrant_url: "http://localhost:6333"
  neo4j_uri: "bolt://localhost:7687"
  neo4j_user: "neo4j"
  neo4j_password: "harnes-dev-pw"

goal_store:
  sqlite_path: "/app/data/goals.db"

procedural_store:
  sqlite_path: "/app/data/skill_metrics.db"
  bundles_dir: "/app/skills"
  # Авто-коммит изменённого skill.yaml в git при SkillRegistry.save.
  # ВКЛ только если уверен — повлияет на git-историю.
  git_auto_commit: false
  git_auto_tag: false

embeddings:
  # /v1/embeddings endpoint на ll-router реализован (роутер v0.2.0+), но backend
  # systemd-unit llama-server-bge-m3 на момент написания не запущен. Когда unit
  # будет поднят — выставить use_server: true. Граmceful fallback на fastembed
  # уже работает: при server-failure агент логирует warning и идёт через fastembed,
  # broken-cache на 60s чтобы не висеть на retry. См. docs/router_roadmap.md R1.
  use_server: false
  # Имя модели в роутере (без BAAI/-префикса — роутер регистрирует как 'bge-m3').
  # Для fastembed-fallback не используется напрямую: fastembed ищет в curated-list
  # и при отсутствии падает на paraphrase-multilingual-mpnet-base-v2.
  model: "bge-m3"

logging:
  level: "INFO"
  trace_log_path: "/app/data/traces"

tick:
  min_interval_seconds: 1.0
  budget_default_tokens: 50000

eval:
  history_db_path: "/app/data/eval_history.db"

metacycle:
  # v1.0 #35 — journal событий и snapshot для recovery в долгом run-loop.
  journal_db_path: "/app/data/metacycle_journal.db"
  snapshot_every_ticks: 50
